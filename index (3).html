<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SiteDesk</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0f1117;--surface:#181c27;--surface2:#1e2333;--border:#2a2f42;--accent:#f59e0b;--accent2:#3b82f6;--green:#22c55e;--red:#ef4444;--orange:#f97316;--text:#f0f2f8;--muted:#7a82a0;--card-radius:14px}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh;max-width:480px;margin:0 auto;padding-bottom:90px}
  /* HEADER */
  .header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 20px 14px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between}
  .logo{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:26px;letter-spacing:1px;color:var(--text)}
  .logo span{color:var(--accent)}
  .header-right{display:flex;align-items:center;gap:12px}
  .notif-btn{width:36px;height:36px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;position:relative}
  .notif-dot{position:absolute;top:6px;right:6px;width:8px;height:8px;background:var(--accent);border-radius:50%;border:2px solid var(--surface)}
  .avatar{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),#f97316);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;color:#000;cursor:pointer}
  .save-indicator{position:fixed;top:70px;right:12px;background:var(--green);color:#000;font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;opacity:0;transition:opacity 0.3s;z-index:150;pointer-events:none}
  .save-indicator.show{opacity:1}
  /* STRIPS */
  .summary-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:16px 16px 8px}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--card-radius);padding:14px 12px;text-align:center;cursor:pointer;transition:border-color 0.2s}
  .stat-card:hover{border-color:var(--accent2)}
  .stat-num{font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:800;line-height:1;margin-bottom:4px}
  .stat-label{font-size:11px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:0.5px}
  .stat-card.active .stat-num{color:var(--accent2)}
  .stat-card.attention .stat-num{color:var(--accent)}
  .stat-card.done .stat-num{color:var(--green)}
  .finance-strip{margin:0 16px 4px;background:var(--surface);border:1px solid var(--border);border-radius:var(--card-radius);overflow:hidden}
  .finance-strip-title{padding:10px 14px 6px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);border-bottom:1px solid var(--border)}
  .finance-strip-row{display:grid;grid-template-columns:repeat(4,1fr)}
  .fin-stat{padding:10px 10px 12px;border-right:1px solid var(--border);text-align:center}
  .fin-stat:last-child{border-right:none}
  .fin-num{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:800;line-height:1;margin-bottom:3px}
  .fin-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px}
  /* SECTION */
  .section-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 8px}
  .section-title{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted)}
  .add-btn{background:var(--accent);color:#000;border:none;border-radius:8px;padding:6px 14px;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:0.5px;display:flex;align-items:center;gap:5px;transition:opacity 0.2s}
  .add-btn:hover{opacity:0.85}
  /* CARDS */
  .projects-list{padding:0 16px;display:flex;flex-direction:column;gap:12px}
  .project-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--card-radius);overflow:hidden;cursor:pointer;transition:border-color 0.2s,transform 0.15s;animation:slideIn 0.3s ease both}
  .project-card:active{transform:scale(0.98)}
  .project-card:hover{border-color:var(--accent2)}
  @keyframes slideIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .card-top{padding:14px 16px 12px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
  .card-left{flex:1;min-width:0}
  .project-name{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;line-height:1.1;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .project-address{font-size:13px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .status-badge{flex-shrink:0;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;padding:3px 9px;border-radius:20px;margin-top:2px}
  .status-active{background:rgba(59,130,246,0.15);color:var(--accent2);border:1px solid rgba(59,130,246,0.3)}
  .status-urgent{background:rgba(239,68,68,0.15);color:var(--red);border:1px solid rgba(239,68,68,0.3)}
  .status-hold{background:rgba(245,158,11,0.15);color:var(--accent);border:1px solid rgba(245,158,11,0.3)}
  .status-done{background:rgba(34,197,94,0.15);color:var(--green);border:1px solid rgba(34,197,94,0.3)}
  .quick-info{display:grid;grid-template-columns:repeat(3,1fr);border-top:1px solid var(--border)}
  .quick-item{padding:10px 12px;border-right:1px solid var(--border);display:flex;flex-direction:column;gap:2px}
  .quick-item:last-child{border-right:none}
  .quick-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px}
  .quick-val{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:600}
  .card-finance{border-top:1px solid var(--border);display:grid;grid-template-columns:repeat(3,1fr)}
  .cf-item{padding:8px 10px;border-right:1px solid var(--border);display:flex;flex-direction:column;gap:2px}
  .cf-item:last-child{border-right:none}
  .cf-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.4px}
  .cf-val{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700}
  .cf-val.won{color:var(--green)}.cf-val.lost{color:var(--red)}.cf-val.pending{color:var(--accent)}.cf-val.owed{color:var(--orange)}.cf-val.paid{color:var(--green)}
  .card-footer{padding:10px 16px 12px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px}
  .progress-bar{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
  .progress-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent2),#60a5fa);transition:width 0.6s ease}
  .progress-pct{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;color:var(--muted);min-width:32px;text-align:right}
  .trades-row{display:flex;gap:5px;align-items:center}
  .trade-chip{font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);white-space:nowrap}
  /* PANEL */
  .panel-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;backdrop-filter:blur(4px)}
  .panel-overlay.open{display:block}
  .detail-panel{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);width:100%;max-width:480px;background:var(--surface);border-top:1px solid var(--border);border-radius:20px 20px 0 0;z-index:201;max-height:92vh;overflow-y:auto;transition:transform 0.35s cubic-bezier(0.34,1.56,0.64,1)}
  .detail-panel.open{transform:translateX(-50%) translateY(0)}
  .panel-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0}
  .panel-header{padding:14px 20px 10px;display:flex;align-items:flex-start;justify-content:space-between;border-bottom:1px solid var(--border)}
  .panel-title{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:800}
  .panel-close{width:32px;height:32px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;color:var(--muted);flex-shrink:0}
  /* PANEL TABS */
  .panel-tabs{display:grid;grid-template-columns:repeat(5,1fr);border-bottom:1px solid var(--border);background:var(--surface)}
  .ptab{padding:10px 4px;text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s}
  .ptab.active{color:var(--accent);border-bottom-color:var(--accent)}
  .ptab-content{display:none}
  .ptab-content.active{display:block}
  .panel-section{padding:14px 20px;border-bottom:1px solid var(--border)}
  .panel-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:10px}
  .info-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:14px}
  .info-row:last-child{border-bottom:none}
  .info-icon{font-size:18px;width:24px;text-align:center;flex-shrink:0}
  .info-label{color:var(--muted);min-width:90px;font-size:12px}
  .info-val{flex:1;font-weight:500}
  .copy-btn{background:none;border:none;color:var(--accent2);font-size:18px;cursor:pointer;padding:0 4px}
  /* SUBS & TASKS */
  .sub-list{display:flex;flex-direction:column;gap:8px}
  .sub-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surface2);border-radius:10px;border:1px solid var(--border)}
  .sub-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;flex-shrink:0}
  .sub-info{flex:1;min-width:0}
  .sub-name{font-weight:600;font-size:14px}
  .sub-trade{font-size:11px;color:var(--muted)}
  .sub-actions{display:flex;gap:6px}
  .sub-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;transition:background 0.15s}
  .sub-btn:hover{background:var(--border)}
  .task-list{display:flex;flex-direction:column;gap:6px}
  .task-item{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--surface2);border-radius:10px;border:1px solid var(--border);font-size:13px}
  .task-check{width:20px;height:20px;border-radius:6px;border:2px solid var(--border);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
  .task-check.done{background:var(--green);border-color:var(--green)}
  .task-text{flex:1}
  .task-text.done{text-decoration:line-through;color:var(--muted)}
  .task-due{font-size:11px;color:var(--muted);white-space:nowrap}
  /* FINANCE */
  .fin-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
  .fin-box{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px}
  .fin-box-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px}
  .fin-box-val{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800}
  .fin-box-val.green{color:var(--green)}.fin-box-val.red{color:var(--red)}.fin-box-val.amber{color:var(--accent)}.fin-box-val.blue{color:var(--accent2)}.fin-box-val.orange{color:var(--orange)}
  .fin-outcome-row{display:flex;gap:8px;margin-bottom:10px}
  .outcome-btn{flex:1;padding:9px 6px;border-radius:10px;border:2px solid var(--border);background:var(--surface2);font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;cursor:pointer;color:var(--muted);transition:all 0.15s;text-align:center}
  .outcome-btn.active-won{border-color:var(--green);background:rgba(34,197,94,0.12);color:var(--green)}
  .outcome-btn.active-lost{border-color:var(--red);background:rgba(239,68,68,0.12);color:var(--red)}
  .outcome-btn.active-pending{border-color:var(--accent);background:rgba(245,158,11,0.12);color:var(--accent)}
  .fin-edit-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .fin-input-group{display:flex;flex-direction:column;gap:4px}
  .fin-input-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px}
  .fin-input{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-family:'Barlow',sans-serif;font-size:14px;outline:none;transition:border-color 0.2s;width:100%}
  .fin-input:focus{border-color:var(--accent2)}
  .save-fin-btn{width:100%;padding:12px;background:var(--accent2);border:none;border-radius:10px;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;color:#fff;cursor:pointer;margin-top:10px;transition:opacity 0.2s}
  .save-fin-btn:hover{opacity:0.85}
  /* FILES */
  .files-list{display:flex;flex-direction:column;gap:8px}
  .file-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:border-color 0.15s;text-decoration:none}
  .file-item:hover{border-color:var(--accent2)}
  .file-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
  .file-icon.pdf{background:rgba(239,68,68,0.15)}.file-icon.drive{background:rgba(59,130,246,0.15)}.file-icon.doc{background:rgba(34,197,94,0.15)}.file-icon.other{background:rgba(245,158,11,0.15)}
  .file-info{flex:1;min-width:0}
  .file-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
  .file-meta{font-size:11px;color:var(--muted);margin-top:2px}
  .file-delete{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:none;color:var(--muted);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;flex-shrink:0;transition:all 0.15s}
  .file-delete:hover{background:rgba(239,68,68,0.15);color:var(--red);border-color:var(--red)}
  .add-file-form{background:var(--surface2);border:1px dashed var(--border);border-radius:10px;padding:12px;margin-top:8px}
  .add-file-btn{width:100%;padding:10px;background:var(--accent2);border:none;border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;color:#fff;cursor:pointer;transition:opacity 0.2s}
  .add-file-btn:hover{opacity:0.85}
  .empty-note{text-align:center;padding:16px;color:var(--muted);font-size:13px}
  /* HOURS & MATERIALS */
  .log-list{display:flex;flex-direction:column;gap:8px;margin-bottom:10px}
  .log-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;display:flex;align-items:center;gap:10px}
  .log-item-info{flex:1;min-width:0}
  .log-item-main{font-size:14px;font-weight:600}
  .log-item-sub{font-size:11px;color:var(--muted);margin-top:2px}
  .log-item-cost{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:800;color:var(--accent);white-space:nowrap}
  .cost-summary{background:var(--surface2);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:10px}
  .cost-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border);font-size:13px}
  .cost-row:last-child{border-bottom:none}
  .cost-row-label{color:var(--muted)}
  .cost-row-val{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800}
  .cost-row.total{background:rgba(239,68,68,0.06)}
  .cost-row.total .cost-row-label{color:var(--text);font-weight:600}
  .cost-row.margin-good{background:rgba(34,197,94,0.06)}
  .cost-row.margin-bad{background:rgba(239,68,68,0.08)}
  .add-log-form{background:var(--surface2);border:1px dashed var(--border);border-radius:10px;padding:12px;margin-top:8px}
  .add-log-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--muted);margin-bottom:10px}
  .log-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
  .log-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px}
  .add-log-btn{width:100%;padding:10px;background:var(--green);border:none;border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;color:#000;cursor:pointer;transition:opacity 0.2s}
  .add-log-btn:hover{opacity:0.85}
  /* PANEL ACTIONS */
  .panel-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px 20px 24px}
  .action-btn{padding:13px;border-radius:12px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:background 0.15s}
  .action-btn:hover{background:var(--border)}
  /* MODAL */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:300;align-items:flex-end;backdrop-filter:blur(4px)}
  .modal-overlay.open{display:flex}
  .modal{width:100%;max-width:480px;margin:0 auto;background:var(--surface);border-radius:20px 20px 0 0;border-top:1px solid var(--border);padding:20px 20px 40px;animation:slideUp 0.3s ease}
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .modal-title{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
  .field-group{margin-bottom:14px}
  .field-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--muted);margin-bottom:6px}
  .field-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-family:'Barlow',sans-serif;font-size:15px;outline:none;transition:border-color 0.2s}
  .field-input:focus{border-color:var(--accent2)}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .submit-btn{width:100%;padding:14px;background:var(--accent);border:none;border-radius:12px;font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;color:#000;cursor:pointer;margin-top:6px;transition:opacity 0.2s}
  .submit-btn:hover{opacity:0.85}
  /* NAV */
  .bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--surface);border-top:1px solid var(--border);display:grid;grid-template-columns:repeat(4,1fr);padding:8px 0 20px;z-index:100}
  .nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;cursor:pointer;opacity:0.45;transition:opacity 0.2s;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--text)}
  .nav-item.active{opacity:1;color:var(--accent)}
  .nav-icon{font-size:22px}
  .toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--green);color:#000;font-weight:700;padding:10px 20px;border-radius:20px;font-family:'Barlow Condensed',sans-serif;font-size:15px;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap}
  .toast.show{opacity:1}
  .empty-state{text-align:center;padding:40px 20px;color:var(--muted)}
  .empty-state .big{font-size:48px;margin-bottom:10px}
  .empty-state p{font-size:14px}
</style>
</head>
<body>

<div class="save-indicator" id="save-indicator">Saved ✓</div>

<div class="header">
  <div class="logo">SITE<span>DESK</span></div>
  <div class="header-right">
    <div class="notif-btn">🔔<div class="notif-dot"></div></div>
    <div class="avatar">M</div>
  </div>
</div>

<div class="summary-strip">
  <div class="stat-card active"><div class="stat-num" id="count-active">0</div><div class="stat-label">Active</div></div>
  <div class="stat-card attention"><div class="stat-num" id="count-urgent">0</div><div class="stat-label">Urgent</div></div>
  <div class="stat-card done"><div class="stat-num" id="count-done">0</div><div class="stat-label">Complete</div></div>
</div>

<div class="finance-strip">
  <div class="finance-strip-title">💰 Financial Overview</div>
  <div class="finance-strip-row">
    <div class="fin-stat"><div class="fin-num" id="fin-quoted" style="color:var(--accent2)">€0</div><div class="fin-label">Quoted</div></div>
    <div class="fin-stat"><div class="fin-num" id="fin-won" style="color:var(--green)">€0</div><div class="fin-label">Won</div></div>

    <div class="fin-stat"><div class="fin-num" id="fin-outstanding" style="color:var(--red)">€0</div><div class="fin-label">Owed</div></div>

</div>

<div class="section-header">

<div class="projects-list" id="projects-list"></div>

<div class="bottom-nav">
  <div class="nav-item active"><div class="nav-icon">🏗️</div>Projects</div>
  <div class="nav-item"><div class="nav-icon">✅</div>Tasks</div>
  <div class="nav-item"><div class="nav-icon">📁</div>Files</div>
  <div class="nav-item"><div class="nav-icon">👷</div>Trades</div>
</div>

<div class="panel-overlay" id="panel-overlay" onclick="closePanel()"></div>
<div class="detail-panel" id="detail-panel">
  <div class="panel-handle"></div>
  <div class="panel-header">
    <div>
      <div class="panel-title" id="panel-name">—</div>
      <div style="font-size:13px;color:var(--muted);margin-top:3px" id="panel-status-line">—</div>
    </div>
    <div class="panel-close" onclick="closePanel()">✕</div>
  </div>
  <div class="panel-tabs">
    <div class="ptab active" onclick="switchTab('site')">📍 Site</div>
    <div class="ptab" onclick="switchTab('costs')">💰 Costs</div>
    <div class="ptab" onclick="switchTab('hours')">⏱️ Hours</div>
    <div class="ptab" onclick="switchTab('materials')">🧱 Materials</div>
    <div class="ptab" onclick="switchTab('files')">📁 Files</div>
  </div>
  <div class="ptab-content active" id="tab-site"></div>
  <div class="ptab-content" id="tab-costs"></div>
  <div class="ptab-content" id="tab-hours"></div>
  <div class="ptab-content" id="tab-materials"></div>
  <div class="ptab-content" id="tab-files"></div>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-title">New Project <span style="cursor:pointer;color:var(--muted);font-size:20px" onclick="closeModal()">✕</span></div>
    <div class="field-group"><div class="field-label">Project Name</div><input class="field-input" id="f-name" placeholder="e.g. Murphy Extension" /></div>
    <div class="field-group"><div class="field-label">Address</div><input class="field-input" id="f-address" placeholder="Full site address" /></div>
    <div class="field-row">
      <div class="field-group"><div class="field-label">Gate Code</div><input class="field-input" id="f-gate" placeholder="e.g. #1234" /></div>
      <div class="field-group"><div class="field-label">Status</div>
        <select class="field-input" id="f-status">
          <option value="Active">Active</option>
          <option value="Urgent">Urgent</option>
          <option value="On Hold">On Hold</option>
          <option value="Complete">Complete</option>
        </select>
      </div>
    </div>
    <div class="field-row">
      <div class="field-group"><div class="field-label">Client Name</div><input class="field-input" id="f-client" placeholder="Client" /></div>
      <div class="field-group"><div class="field-label">Quote Value (€)</div><input class="field-input" id="f-quoted" type="number" placeholder="e.g. 85000" /></div>
    </div>
    <div class="field-group"><div class="field-label">Progress %</div><input class="field-input" id="f-progress" type="number" min="0" max="100" placeholder="0" /></div>
    <button class="submit-btn" onclick="addProject()">ADD PROJECT →</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'sitedesk_v2';

function saveData() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(projects));
    const ind = document.getElementById('save-indicator');
    ind.classList.add('show');
    setTimeout(() => ind.classList.remove('show'), 1500);
  } catch(e) {}
}

function loadData() {
  try {
    // try v2 first, fall back to v1
    let raw = localStorage.getItem(STORAGE_KEY) || localStorage.getItem('sitedesk_v1');
    if (raw) { const p = JSON.parse(raw); if (Array.isArray(p) && p.length > 0) return p; }
  } catch(e) {}
  return null;
}

const defaultProjects = [
  { id:1, name:"Murphy Extension", client:"Brian Murphy", address:"14 Oak Lane, Tullamore, Co. Offaly", gate:"#4521", status:"Active", progress:65, trades:["Elec","Plumb","Plasterer"],
    finance:{quoted:85000,outcome:"won",invoiced:55000,paid:40000}, files:[],
    hours:[{who:"Joe Flynn",date:"02/04",hrs:8,rate:45},{who:"Pat Daly",date:"02/04",hrs:6,rate:50}],
    materials:[{name:"Plasterboard 12mm",supplier:"Murdocks",qty:40,unit:"sheets",cost:18},{name:"Insulation Rolls",supplier:"Murdocks",qty:10,unit:"rolls",cost:32}],
    subs:[{name:"Joe Flynn",trade:"Electrical",phone:"087 123 4567",color:"#3b82f6"},{name:"Pat Daly",trade:"Plumbing",phone:"086 234 5678",color:"#22c55e"},{name:"Mick Brennan",trade:"Plastering",phone:"085 345 6789",color:"#f97316"}],
    tasks:[{text:"First fix electrical complete",done:true,due:"Done"},{text:"Plumbing rough-in sign off",done:true,due:"Done"},{text:"Plasterboard delivery",done:false,due:"Mon"},{text:"Windows measured & ordered",done:false,due:"Tue"}]},
  { id:2, name:"Kelly New Build", client:"Mary Kelly", address:"Clonmore Rd, Edenderry, Co. Offaly", gate:"No gate", status:"Urgent", progress:30, trades:["Block","Elec","Carp"],
    finance:{quoted:220000,outcome:"won",invoiced:60000,paid:60000}, files:[], hours:[], materials:[],
    subs:[{name:"Tom Walsh",trade:"Block Laying",phone:"087 456 7890",color:"#ef4444"},{name:"Joe Flynn",trade:"Electrical",phone:"087 123 4567",color:"#3b82f6"}],
    tasks:[{text:"Roof felt & batten — urgent",done:false,due:"Today"},{text:"Block work gable end",done:false,due:"Today"},{text:"Structural engineer sign off",done:false,due:"Wed"}]},
  { id:3, name:"O'Brien Renovation", client:"Sean O'Brien", address:"22 Castle Street, Birr, Co. Offaly", gate:"Key in lockbox: 7743", status:"Active", progress:80, trades:["Plumb","Tiler","Painter"],
    finance:{quoted:32000,outcome:"won",invoiced:28000,paid:20000}, files:[], hours:[], materials:[],
    subs:[{name:"Pat Daly",trade:"Plumbing",phone:"086 234 5678",color:"#22c55e"},{name:"Ann Foley",trade:"Tiling",phone:"087 567 8901",color:"#a855f7"}],
    tasks:[{text:"Bathroom tiling complete",done:true,due:"Done"},{text:"Snagging list — kitchen",done:false,due:"Thu"},{text:"Final clean & handover",done:false,due:"Fri"}]}
];

let projects = loadData() || defaultProjects;
projects.forEach(p => {
  if (!p.files) p.files = [];
  if (!p.hours) p.hours = [];
  if (!p.materials) p.materials = [];
});
let currentProject = null;
let currentTab = 'site';

function fmt(n) {
  if (!n) return '€0';
  if (n >= 1000) return '€' + (n/1000).toFixed(n % 1000 === 0 ? 0 : 1) + 'k';
  return '€' + n;
}
function fmtFull(n) { return '€' + (n||0).toLocaleString(); }

function totalHoursCost(p) { return (p.hours||[]).reduce((s,h) => s + (h.hrs * h.rate), 0); }
function totalMaterialsCost(p) { return (p.materials||[]).reduce((s,m) => s + (m.qty * m.cost), 0); }
function totalCosts(p) { return totalHoursCost(p) + totalMaterialsCost(p); }

function fileIcon(url) {
  const u = (url||'').toLowerCase();
  if (u.includes('drive.google')) return {icon:'📁',cls:'drive'};
  if (u.includes('.pdf')||u.includes('pdf')) return {icon:'📄',cls:'pdf'};
  if (u.includes('dropbox')) return {icon:'📦',cls:'drive'};
  if (u.includes('.doc')||u.includes('docs.google')) return {icon:'📝',cls:'doc'};
  if (u.includes('.dwg')||u.includes('.dxf')) return {icon:'📐',cls:'other'};
  if (u.includes('.jpg')||u.includes('.png')) return {icon:'🖼️',cls:'other'};
  return {icon:'🔗',cls:'other'};
}

function timeAgo(ts) {
  if (!ts) return '';
  const m = Math.floor((Date.now()-ts)/60000);
  if (m < 1) return 'just now';
  if (m < 60) return m+'m ago';
  const h = Math.floor(m/60);
  if (h < 24) return h+'h ago';
  return Math.floor(h/24)+'d ago';
}

function render() {
  const list = document.getElementById('projects-list');
  list.innerHTML = '';
  document.getElementById('count-active').textContent = projects.filter(p=>p.status==='Active').length;
  document.getElementById('count-urgent').textContent = projects.filter(p=>p.status==='Urgent').length;
  document.getElementById('count-done').textContent = projects.filter(p=>p.status==='Complete').length;
  const won = projects.filter(p=>p.finance&&p.finance.outcome==='won');
  document.getElementById('fin-quoted').textContent = fmt(projects.reduce((s,p)=>s+(p.finance?.quoted||0),0));
  document.getElementById('fin-won').textContent = fmt(won.reduce((s,p)=>s+(p.finance?.quoted||0),0));
  document.getElementById('fin-costs').textContent = fmt(projects.reduce((s,p)=>s+totalCosts(p),0));
  const inv = won.reduce((s,p)=>s+(p.finance?.invoiced||0),0);
  const paid = won.reduce((s,p)=>s+(p.finance?.paid||0),0);
  document.getElementById('fin-outstanding').textContent = fmt(inv-paid);
  if (!projects.length) { list.innerHTML='<div class="empty-state"><div class="big">🏗️</div><p>No projects yet.</p></div>'; return; }
  projects.forEach((p,i) => {
    const f = p.finance||{quoted:0,outcome:'pending',invoiced:0,paid:0};
    const owed = (f.invoiced||0)-(f.paid||0);
    const sc = {Active:'status-active',Urgent:'status-urgent','On Hold':'status-hold',Complete:'status-done'}[p.status]||'status-active';
    const oc = f.outcome==='won'?'won':f.outcome==='lost'?'lost':'pending';
    const ol = f.outcome==='won'?'✓ Won':f.outcome==='lost'?'✗ Lost':'⏳ Pending';
    const tc = totalCosts(p);
    const card = document.createElement('div');
    card.className = 'project-card';
    card.style.animationDelay = (i*0.05)+'s';
    card.innerHTML = `
      <div class="card-top">
        <div class="card-left">
          <div class="project-name">${p.name}</div>
          <div class="project-address">📍 ${p.address}</div>
        </div>
        <div class="status-badge ${sc}">${p.status}</div>
      </div>
      <div class="quick-info">
        <div class="quick-item"><span class="quick-label">Client</span><span class="quick-val">${p.client.split(' ')[0]}</span></div>
        <div class="quick-item"><span class="quick-label">Gate</span><span class="quick-val" style="font-size:12px">${p.gate}</span></div>
        <div class="quick-item"><span class="quick-label">Costs</span><span class="quick-val" style="color:var(--orange)">${fmt(tc)}</span></div>
      </div>
      <div class="card-finance">
        <div class="cf-item"><span class="cf-label">Quoted</span><span class="cf-val">${fmt(f.quoted)}</span></div>
        <div class="cf-item"><span class="cf-label">Outcome</span><span class="cf-val ${oc}">${ol}</span></div>
        <div class="cf-item"><span class="cf-label">Owed</span><span class="cf-val ${owed>0?'owed':'paid'}">${owed>0?fmt(owed):'Clear'}</span></div>
      </div>
      <div class="card-footer">
        <div class="trades-row">${p.trades.map(t=>`<span class="trade-chip">${t}</span>`).join('')}</div>
        <div class="progress-bar"><div class="progress-fill" style="width:${p.progress}%"></div></div>
        <div class="progress-pct">${p.progress}%</div>
      </div>`;
    card.onclick = () => openPanel(p.id);
    list.appendChild(card);
  });
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.ptab').forEach((t,i) => {
    const tabs = ['site','costs','hours','materials','files'];
    t.classList.toggle('active', tabs[i] === tab);
  });
  document.querySelectorAll('.ptab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
}

function openPanel(id) {
  currentProject = projects.find(p=>p.id===id);
  if (!currentProject) return;
  const p = currentProject;
  if (!p.files) p.files=[];
  if (!p.hours) p.hours=[];
  if (!p.materials) p.materials=[];
  document.getElementById('panel-name').textContent = p.name;
  document.getElementById('panel-status-line').textContent = `${p.client} · ${p.status}`;
  renderAllTabs(id);
  switchTab('site');
  document.getElementById('panel-overlay').classList.add('open');
  document.getElementById('detail-panel').classList.add('open');
}

function renderAllTabs(id) {
  const p = projects.find(p=>p.id===id); if (!p) return;
  const f = p.finance||{quoted:0,outcome:'pending',invoiced:0,paid:0};
  const owed = (f.invoiced||0)-(f.paid||0);
  const labourCost = totalHoursCost(p);
  const matCost = totalMaterialsCost(p);
  const totalCost = labourCost + matCost;
  const margin = (f.quoted||0) - totalCost;
  const marginPct = f.quoted ? Math.round((margin/f.quoted)*100) : 0;

  // ── SITE TAB ──
  document.getElementById('tab-site').innerHTML = `
    <div class="panel-section">
      <div class="panel-section-title">Site Info</div>
      <div class="info-row"><span class="info-icon">📍</span><span class="info-label">Address</span><span class="info-val">${p.address}</span><button class="copy-btn" onclick="copyText('${p.address}')">📋</button></div>
      <div class="info-row"><span class="info-icon">🔑</span><span class="info-label">Gate / Access</span><span class="info-val">${p.gate}</span><button class="copy-btn" onclick="copyText('${p.gate}')">📋</button></div>
      <div class="info-row"><span class="info-icon">👤</span><span class="info-label">Client</span><span class="info-val">${p.client}</span></div>
      <div class="info-row"><span class="info-icon">📊</span><span class="info-label">Progress</span><span class="info-val">${p.progress}% complete</span></div>
    </div>
    <div class="panel-section">
      <div class="panel-section-title">Subcontractors</div>
      <div class="sub-list">${p.subs.length===0?'<div class="empty-note">No subs added yet</div>':p.subs.map(s=>`<div class="sub-item"><div class="sub-avatar" style="background:${s.color}22;color:${s.color};border:1px solid ${s.color}44">${s.name.split(' ').map(n=>n[0]).join('')}</div><div class="sub-info"><div class="sub-name">${s.name}</div><div class="sub-trade">${s.trade} · ${s.phone}</div></div><div class="sub-actions"><div class="sub-btn" onclick="callSub('${s.phone}')">📞</div><div class="sub-btn" onclick="whatsappSub('${s.phone}','${p.name}')">💬</div></div></div>`).join('')}</div>
    </div>
    <div class="panel-section">
      <div class="panel-section-title">Tasks</div>
      <div class="task-list">${p.tasks.length===0?'<div class="empty-note">No tasks yet</div>':p.tasks.map((t,i)=>`<div class="task-item"><div class="task-check ${t.done?'done':''}" onclick="toggleTask(${id},${i})">${t.done?'✓':''}</div><span class="task-text ${t.done?'done':''}">${t.text}</span><span class="task-due">${t.due}</span></div>`).join('')}</div>
    </div>
    <div class="panel-actions">
      <button class="action-btn" onclick="copyText('${p.address}')">📍 Copy Address</button>
      <button class="action-btn" onclick="copyText('${p.gate}')">🔑 Copy Gate Code</button>
    </div>`;

  // ── COSTS TAB ──
  const wc=f.outcome==='won'?'active-won':'', lc=f.outcome==='lost'?'active-lost':'', pc=f.outcome==='pending'?'active-pending':'';
  const marginClass = margin >= 0 ? 'margin-good' : 'margin-bad';
  document.getElementById('tab-costs').innerHTML = `
    <div class="panel-section">
      <div class="panel-section-title">Cost Summary</div>
      <div class="cost-summary">
        <div class="cost-row"><span class="cost-row-label">Labour (hours)</span><span class="cost-row-val" style="color:var(--accent2)">${fmtFull(labourCost)}</span></div>
        <div class="cost-row"><span class="cost-row-label">Materials</span><span class="cost-row-val" style="color:var(--accent)">${fmtFull(matCost)}</span></div>
        <div class="cost-row total"><span class="cost-row-label">Total Costs</span><span class="cost-row-val" style="color:var(--orange)">${fmtFull(totalCost)}</span></div>
        <div class="cost-row"><span class="cost-row-label">Quote Value</span><span class="cost-row-val" style="color:var(--accent2)">${fmtFull(f.quoted)}</span></div>
        <div class="cost-row ${marginClass}"><span class="cost-row-label" style="font-weight:700">Margin (est.)</span><span class="cost-row-val" style="color:${margin>=0?'var(--green)':'var(--red)'}">${fmtFull(margin)} (${marginPct}%)</span></div>
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-section-title">Invoice Status</div>
      <div class="fin-grid">
        <div class="fin-box"><div class="fin-box-label">Invoiced</div><div class="fin-box-val amber">${fmtFull(f.invoiced)}</div></div>
        <div class="fin-box"><div class="fin-box-label">Paid</div><div class="fin-box-val green">${fmtFull(f.paid)}</div></div>
        <div class="fin-box"><div class="fin-box-label">Outstanding</div><div class="fin-box-val ${owed>0?'red':'green'}">${owed>0?fmtFull(owed):'Clear ✓'}</div></div>
        <div class="fin-box"><div class="fin-box-label">Quote</div><div class="fin-box-val blue">${fmtFull(f.quoted)}</div></div>
      </div>
      <div class="panel-section-title" style="margin-bottom:8px">Quote Outcome</div>
      <div class="fin-outcome-row">
        <div class="outcome-btn ${wc}" onclick="setOutcome(${id},'won')">✓ Won</div>
        <div class="outcome-btn ${lc}" onclick="setOutcome(${id},'lost')">✗ Lost</div>
        <div class="outcome-btn ${pc}" onclick="setOutcome(${id},'pending')">⏳ Pending</div>
      </div>
      <div class="fin-edit-grid">
        <div class="fin-input-group"><div class="fin-input-label">Quote (€)</div><input class="fin-input" id="fin-q-${id}" type="number" value="${f.quoted||''}" placeholder="0" /></div>
        <div class="fin-input-group"><div class="fin-input-label">Invoiced (€)</div><input class="fin-input" id="fin-i-${id}" type="number" value="${f.invoiced||''}" placeholder="0" /></div>
        <div class="fin-input-group"><div class="fin-input-label">Paid (€)</div><input class="fin-input" id="fin-p-${id}" type="number" value="${f.paid||''}" placeholder="0" /></div>
      </div>
      <button class="save-fin-btn" onclick="saveFinance(${id})">Save Financials</button>
    </div>`;

  // ── HOURS TAB ──
  const hoursHTML = p.hours.length===0 ? '<div class="empty-note">⏱️ No hours logged yet</div>'
    : p.hours.map((h,i) => `<div class="log-item"><div class="log-item-info"><div class="log-item-main">${h.who}</div><div class="log-item-sub">${h.date} · ${h.hrs} hrs @ €${h.rate}/hr</div></div><span class="log-item-cost">${fmtFull(h.hrs*h.rate)}</span><button class="file-delete" onclick="deleteHour(${id},${i})">✕</button></div>`).join('');
  document.getElementById('tab-hours').innerHTML = `
    <div class="panel-section">
      <div class="panel-section-title">Hours on Site <span style="color:var(--accent2);margin-left:8px">${fmtFull(labourCost)} total</span></div>
      <div class="log-list">${hoursHTML}</div>
      <div class="add-log-form">
        <div class="add-log-title">Log Hours</div>
        <div class="log-grid">
          <div class="fin-input-group"><div class="fin-input-label">Who</div><input class="fin-input" id="h-who-${id}" placeholder="Name / Trade" /></div>
          <div class="fin-input-group"><div class="fin-input-label">Date</div><input class="fin-input" id="h-date-${id}" placeholder="e.g. 02/04" /></div>
        </div>
        <div class="log-grid">
          <div class="fin-input-group"><div class="fin-input-label">Hours</div><input class="fin-input" id="h-hrs-${id}" type="number" placeholder="8" /></div>
          <div class="fin-input-group"><div class="fin-input-label">Rate €/hr</div><input class="fin-input" id="h-rate-${id}" type="number" placeholder="45" /></div>
        </div>
        <button class="add-log-btn" onclick="addHour(${id})">＋ Log Hours</button>
      </div>
    </div>`;

  // ── MATERIALS TAB ──
  const matsHTML = p.materials.length===0 ? '<div class="empty-note">🧱 No materials logged yet</div>'
    : p.materials.map((m,i) => `<div class="log-item"><div class="log-item-info"><div class="log-item-main">${m.name}</div><div class="log-item-sub">${m.supplier} · ${m.qty} ${m.unit} @ €${m.cost} each</div></div><span class="log-item-cost">${fmtFull(m.qty*m.cost)}</span><button class="file-delete" onclick="deleteMaterial(${id},${i})">✕</button></div>`).join('');
  document.getElementById('tab-materials').innerHTML = `
    <div class="panel-section">
      <div class="panel-section-title">Materials Used <span style="color:var(--accent);margin-left:8px">${fmtFull(matCost)} total</span></div>
      <div class="log-list">${matsHTML}</div>
      <div class="add-log-form">
        <div class="add-log-title">Add Material</div>
        <div class="log-grid">
          <div class="fin-input-group"><div class="fin-input-label">Material</div><input class="fin-input" id="m-name-${id}" placeholder="e.g. Plasterboard" /></div>
          <div class="fin-input-group"><div class="fin-input-label">Supplier</div><input class="fin-input" id="m-sup-${id}" placeholder="e.g. Murdocks" /></div>
        </div>
        <div class="log-grid-3">
          <div class="fin-input-group"><div class="fin-input-label">Qty</div><input class="fin-input" id="m-qty-${id}" type="number" placeholder="10" /></div>
          <div class="fin-input-group"><div class="fin-input-label">Unit</div><input class="fin-input" id="m-unit-${id}" placeholder="sheets" /></div>
          <div class="fin-input-group"><div class="fin-input-label">Cost €/unit</div><input class="fin-input" id="m-cost-${id}" type="number" placeholder="18" /></div>
        </div>
        <button class="add-log-btn" style="background:var(--accent)" onclick="addMaterial(${id})">＋ Add Material</button>
      </div>
    </div>`;

  // ── FILES TAB ──
  const filesHTML = p.files.length===0 ? '<div class="empty-note">📂 No files yet</div>'
    : p.files.map((file,fi)=>{ const ic=fileIcon(file.url); return `<a class="file-item" href="${file.url}" target="_blank" onclick="event.stopPropagation()"><div class="file-icon ${ic.cls}">${ic.icon}</div><div class="file-info"><div class="file-name">${file.name}</div><div class="file-meta">${timeAgo(file.added)} · tap to open</div></div><button class="file-delete" onclick="deleteFile(event,${id},${fi})">✕</button></a>`; }).join('');
  document.getElementById('tab-files').innerHTML = `
    <div class="panel-section">
      <div class="panel-section-title">📁 Files & Drawings</div>
      <div class="files-list">${filesHTML}</div>
      <div class="add-file-form">
        <div class="fin-input-label" style="margin-bottom:6px">Add Google Drive / Dropbox link</div>
        <input class="fin-input" id="file-name-${id}" placeholder="Name (e.g. Floor Plan Rev2)" style="margin-bottom:8px" />
        <input class="fin-input" id="file-url-${id}" placeholder="Paste share link here..." style="margin-bottom:8px" />
        <button class="add-file-btn" onclick="addFile(${id})">＋ Add File</button>
      </div>
    </div>`;
}

function closePanel() {
  document.getElementById('panel-overlay').classList.remove('open');
  document.getElementById('detail-panel').classList.remove('open');
}

// HOURS
function addHour(id) {
  const p = projects.find(p=>p.id===id); if (!p) return;
  const who = document.getElementById('h-who-'+id).value.trim();
  const date = document.getElementById('h-date-'+id).value.trim();
  const hrs = parseFloat(document.getElementById('h-hrs-'+id).value)||0;
  const rate = parseFloat(document.getElementById('h-rate-'+id).value)||0;
  if (!who||!hrs||!rate) { showToast('Fill in all fields'); return; }
  if (!p.hours) p.hours=[];
  p.hours.push({who,date:date||'Today',hrs,rate});
  saveData(); render(); renderAllTabs(id); switchTab('hours');
  showToast(who+' — '+hrs+'hrs logged ✓');
}
function deleteHour(id, idx) {
  const p = projects.find(p=>p.id===id); if (!p) return;
  p.hours.splice(idx,1);
  saveData(); render(); renderAllTabs(id); switchTab('hours');
}

// MATERIALS
function addMaterial(id) {
  const p = projects.find(p=>p.id===id); if (!p) return;
  const name = document.getElementById('m-name-'+id).value.trim();
  const sup = document.getElementById('m-sup-'+id).value.trim();
  const qty = parseFloat(document.getElementById('m-qty-'+id).value)||0;
  const unit = document.getElementById('m-unit-'+id).value.trim()||'units';
  const cost = parseFloat(document.getElementById('m-cost-'+id).value)||0;
  if (!name||!qty||!cost) { showToast('Fill in material, qty and cost'); return; }
  if (!p.materials) p.materials=[];
  p.materials.push({name,supplier:sup||'—',qty,unit,cost});
  saveData(); render(); renderAllTabs(id); switchTab('materials');
  showToast(name+' added ✓');
}
function deleteMaterial(id, idx) {
  const p = projects.find(p=>p.id===id); if (!p) return;
  p.materials.splice(idx,1);
  saveData(); render(); renderAllTabs(id); switchTab('materials');
}

// FILES
function addFile(id) {
  const p = projects.find(p=>p.id===id); if (!p) return;
  const name = document.getElementById('file-name-'+id).value.trim();
  const url = document.getElementById('file-url-'+id).value.trim();
  if (!name||!url) { showToast('Enter a name and a link'); return; }
  if (!p.files) p.files=[];
  p.files.push({name,url,added:Date.now()});
  saveData(); render(); renderAllTabs(id); switchTab('files');
  showToast(name+' added ✓');
}
function deleteFile(e, id, idx) {
  e.preventDefault(); e.stopPropagation();
  const p = projects.find(p=>p.id===id); if (!p) return;
  p.files.splice(idx,1);
  saveData(); render(); renderAllTabs(id); switchTab('files');
}

// FINANCE
function setOutcome(id, outcome) {
  const p = projects.find(p=>p.id===id); if (!p) return;
  if (!p.finance) p.finance={quoted:0,outcome:'pending',invoiced:0,paid:0};
  p.finance.outcome=outcome;
  saveData(); render(); renderAllTabs(id); switchTab('costs');
}
function saveFinance(id) {
  const p = projects.find(p=>p.id===id); if (!p) return;
  if (!p.finance) p.finance={quoted:0,outcome:'pending',invoiced:0,paid:0};
  p.finance.quoted=parseFloat(document.getElementById('fin-q-'+id).value)||0;
  p.finance.invoiced=parseFloat(document.getElementById('fin-i-'+id).value)||0;
  p.finance.paid=parseFloat(document.getElementById('fin-p-'+id).value)||0;
  saveData(); render(); renderAllTabs(id); switchTab('costs');
  showToast('Financials saved ✓');
}

// TASKS
function toggleTask(id, idx) {
  const p = projects.find(p=>p.id===id); if (!p) return;
  p.tasks[idx].done=!p.tasks[idx].done;
  saveData(); render(); renderAllTabs(id); switchTab('site');
}

// ADD PROJECT
function openModal() { document.getElementById('modal-overlay').classList.add('open'); }
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
function closeModalOutside(e) { if (e.target===document.getElementById('modal-overlay')) closeModal(); }
function addProject() {
  const name=document.getElementById('f-name').value.trim();
  const address=document.getElementById('f-address').value.trim();
  if (!name||!address) { showToast('Name and address required'); return; }
  projects.unshift({
    id:Date.now(), name,
    client:document.getElementById('f-client').value.trim()||'Unknown',
    address, gate:document.getElementById('f-gate').value.trim()||'No gate',
    status:document.getElementById('f-status').value,
    progress:parseInt(document.getElementById('f-progress').value)||0,
    finance:{quoted:parseFloat(document.getElementById('f-quoted').value)||0,outcome:'pending',invoiced:0,paid:0},
    files:[], hours:[], materials:[], trades:[], subs:[], tasks:[]
  });
  saveData(); closeModal(); render();
  showToast(name+' added ✓');
  ['f-name','f-address','f-gate','f-client','f-progress','f-quoted'].forEach(id=>document.getElementById(id).value='');
}

// UTILS
function copyText(text) {
  if (navigator.clipboard) navigator.clipboard.writeText(text).then(()=>showToast('Copied ✓'));
  else showToast('Copied!');
}
function callSub(phone) { window.location.href='tel:'+phone.replace(/\s/g,''); }
function whatsappSub(phone,project) {
  window.open('https://wa.me/'+phone.replace(/\s/g,'').replace(/^0/,'353')+'?text=Hi, re: '+encodeURIComponent(project)+' — ','_blank');
}
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

render();
</script>
</body>
</html>
